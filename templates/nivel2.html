<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nivel 2 | CodeMaster</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Animaciones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body{
            background:
            linear-gradient(135deg,#0f172a,#111827,#1e1b4b);

            min-height:100vh;
            overflow:hidden;
            font-family:Arial, Helvetica, sans-serif;
            color:white;
            position:relative;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        /* EFECTOS */

        .circulo1{
            position:absolute;
            width:350px;
            height:350px;
            background:#38bdf8;
            border-radius:50%;
            filter:blur(140px);
            top:-120px;
            left:-120px;
            opacity:0.30;
        }

        .circulo2{
            position:absolute;
            width:350px;
            height:350px;
            background:#facc15;
            border-radius:50%;
            filter:blur(140px);
            bottom:-120px;
            right:-120px;
            opacity:0.30;
        }

        /* CARD */

        .nivel-card{
            position:relative;
            z-index:2;

            width:100%;
            max-width:700px;

            background:rgba(30,41,59,0.8);

            border-radius:30px;

            padding:50px;

            text-align:center;

            backdrop-filter:blur(12px);

            border:1px solid rgba(255,255,255,0.08);

            box-shadow:
            0 0 40px rgba(0,0,0,0.35);
        }

        /* ICONO */

        .icono{
            font-size:90px;
            color:#facc15;

            margin-bottom:20px;

            animation:flotar 3s infinite ease-in-out;
        }

        @keyframes flotar{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-15px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        /* TEXTOS */

        .titulo{
            font-size:60px;
            font-weight:900;
            color:#facc15;

            text-shadow:
            0 0 15px #facc15,
            0 0 35px #facc15;
        }

        .subtitulo{
            margin-top:20px;
            font-size:24px;
            color:#cbd5e1;
        }

        .descripcion{
            margin-top:25px;
            font-size:18px;
            color:#94a3b8;
            line-height:1.7;
        }

        /* BOTONES */

        .btn-custom{
            margin-top:35px;

            padding:16px 40px;

            border:none;

            border-radius:15px;

            font-size:20px;
            font-weight:bold;

            transition:0.4s;
        }

        .btn-jugar{

            background:
            linear-gradient(45deg,#22c55e,#16a34a);

            color:white;

            box-shadow:
            0 0 20px rgba(34,197,94,0.5);

        }

        .btn-jugar:hover{

            transform:translateY(-5px);

            box-shadow:
            0 0 35px rgba(34,197,94,0.9);

        }

        .btn-volver{

            background:
            linear-gradient(45deg,#8b5cf6,#7c3aed);

            color:white;

            box-shadow:
            0 0 20px rgba(139,92,246,0.5);

            margin-left:10px;

        }

        .btn-volver:hover{

            transform:translateY(-5px);

            box-shadow:
            0 0 35px rgba(139,92,246,0.9);

        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .nivel-card{
                margin:20px;
                padding:35px;
            }

            .titulo{
                font-size:40px;
            }

            .subtitulo{
                font-size:20px;
            }

            .descripcion{
                font-size:16px;
            }

            .btn-custom{
                width:100%;
                margin-left:0;
            }

        }

    </style>

</head>

<body>

    <!-- EFECTOS -->
    <div class="circulo1"></div>
    <div class="circulo2"></div>

    <!-- CARD -->

    <div class="nivel-card animate__animated animate__zoomIn">

        <div class="icono">
            <i class="bi bi-database-fill"></i>
        </div>

        <h1 class="titulo">
            Nivel 2
        </h1>

        <h3 class="subtitulo">
            SQL Básico
        </h3>

        <p class="descripcion">

            Bienvenido al segundo nivel de CodeMaster.
            Aquí aprenderás consultas SQL, selección de datos,
            filtros, tablas y comandos fundamentales de bases de datos.

        </p>

        <!-- BOTONES -->

        <div class="mt-4">

            <a href="/pregunta4">

                <button class="btn btn-custom btn-jugar">

                    <i class="bi bi-play-fill"></i>
                    Iniciar Nivel

                </button>

            </a>

            <a href="/dashboard">

                <button class="btn btn-custom btn-volver">

                    <i class="bi bi-house-door-fill"></i>
                    Volver al Inicio

                </button>

            </a>

        </div>

    </div>

</body>
</html>
