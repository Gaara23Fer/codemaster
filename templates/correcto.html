<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Respuesta Correcta | CodeMaster</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Animaciones -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body{

            background:
            linear-gradient(135deg,#0f172a,#111827,#1e1b4b);

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            font-family:Arial, Helvetica, sans-serif;

            position:relative;

            color:white;

        }

        /* EFECTOS */

        .circulo1{

            position:absolute;

            width:350px;
            height:350px;

            background:#22c55e;

            border-radius:50%;

            filter:blur(140px);

            top:-120px;
            left:-120px;

            opacity:0.30;

        }

        .circulo2{

            position:absolute;

            width:350px;
            height:350px;

            background:#38bdf8;

            border-radius:50%;

            filter:blur(140px);

            bottom:-120px;
            right:-120px;

            opacity:0.30;

        }

        /* CARD */

        .correcto-card{

            position:relative;
            z-index:2;

            width:100%;
            max-width:650px;

            background:rgba(30,41,59,0.82);

            border-radius:30px;

            padding:50px;

            text-align:center;

            backdrop-filter:blur(14px);

            border:1px solid rgba(255,255,255,0.08);

            box-shadow:
            0 0 40px rgba(0,0,0,0.35);

        }

        /* ICONO */

        .icono{

            font-size:100px;

            color:#22c55e;

            margin-bottom:20px;

            animation:rebote 2s infinite;

        }

        @keyframes rebote{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-15px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        /* TEXTOS */

        .titulo{

            font-size:60px;

            font-weight:900;

            color:#22c55e;

            text-shadow:
            0 0 15px #22c55e,
            0 0 35px #22c55e;

        }

        .texto{

            margin-top:25px;

            font-size:24px;

            color:#cbd5e1;

        }

        .xp{

            margin-top:15px;

            font-size:30px;

            font-weight:bold;

            color:#facc15;

            text-shadow:
            0 0 10px #facc15;

        }

        /* BOTON */

        .btn-siguiente{

            margin-top:40px;

            background:
            linear-gradient(45deg,#8b5cf6,#7c3aed);

            border:none;

            padding:16px 45px;

            border-radius:15px;

            color:white;

            font-size:20px;
            font-weight:bold;

            transition:0.4s;

            box-shadow:
            0 0 20px rgba(139,92,246,0.5);

        }

        .btn-siguiente:hover{

            transform:translateY(-5px);

            box-shadow:
            0 0 35px rgba(139,92,246,0.9);

        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .correcto-card{

                margin:20px;
                padding:35px;

            }

            .titulo{
                font-size:42px;
            }

            .texto{
                font-size:20px;
            }

            .xp{
                font-size:24px;
            }

            .btn-siguiente{
                width:100%;
            }

        }

    </style>

</head>

<body>

    <!-- EFECTOS -->

    <div class="circulo1"></div>
    <div class="circulo2"></div>

    <!-- CARD -->

    <div class="correcto-card animate__animated animate__zoomIn">

        <div class="icono">
            <i class="bi bi-check-circle-fill"></i>
        </div>

        <h1 class="titulo">
            ¡Correcto!
        </h1>

        <p class="texto">
            Excelente respuesta. Continúa avanzando en CodeMaster.
        </p>

        <div class="xp">
            +10 XP
        </div>

        <a href="/pregunta2">

            <button class="btn btn-siguiente">

                <i class="bi bi-arrow-right-circle-fill"></i>

                Siguiente Pregunta

            </button>

        </a>

    </div>

</body>
</html>
