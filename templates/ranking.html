<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ranking | CodeMaster</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Animaciones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body{
            background:
            linear-gradient(135deg,#0f172a,#111827,#1e1b4b);

            min-height:100vh;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
            overflow-x:hidden;
            position:relative;
        }

        /* EFECTOS */

        .circulo1{
            position:fixed;
            width:350px;
            height:350px;
            background:#facc15;
            border-radius:50%;
            filter:blur(140px);
            top:-120px;
            left:-120px;
            opacity:0.25;
            z-index:-1;
        }

        .circulo2{
            position:fixed;
            width:350px;
            height:350px;
            background:#38bdf8;
            border-radius:50%;
            filter:blur(140px);
            bottom:-120px;
            right:-120px;
            opacity:0.25;
            z-index:-1;
        }

        /* TITULO */

        .titulo{
            text-align:center;
            margin-top:60px;
            font-size:60px;
            font-weight:900;
            color:#facc15;

            text-shadow:
            0 0 15px #facc15,
            0 0 35px #facc15;
        }

        .subtitulo{
            text-align:center;
            color:#cbd5e1;
            margin-top:15px;
            font-size:20px;
        }

        /* TABLA */

        .ranking-card{
            margin-top:50px;
            background:rgba(30,41,59,0.8);
            border-radius:25px;
            padding:30px;
            backdrop-filter:blur(10px);

            box-shadow:
            0 0 35px rgba(0,0,0,0.3);

            border:1px solid rgba(255,255,255,0.08);
        }

        table{
            color:white !important;
        }

        thead{
            background:#1e293b;
        }

        th{
            padding:18px !important;
            font-size:20px;
            border:none !important;
            color:#facc15 !important;
        }

        td{
            padding:18px !important;
            vertical-align:middle;
            border-color:rgba(255,255,255,0.05) !important;
        }

        tbody tr{
            transition:0.3s;
        }

        tbody tr:hover{
            background:#334155;
            transform:scale(1.01);
        }

        /* POSICIONES */

        .puesto{
            font-size:24px;
            font-weight:bold;
        }

        .oro{
            color:#facc15;
        }

        .plata{
            color:#cbd5e1;
        }

        .bronce{
            color:#fb923c;
        }

        /* XP */

        .xp{
            color:#22c55e;
            font-weight:bold;
            font-size:18px;
        }

        /* BOTON */

        .btn-inicio{
            margin-top:40px;
            background:
            linear-gradient(45deg,#8b5cf6,#7c3aed);

            border:none;
            padding:16px 40px;
            border-radius:15px;
            color:white;
            font-size:20px;
            font-weight:bold;

            transition:0.4s;

            box-shadow:
            0 0 20px rgba(139,92,246,0.5);
        }

        .btn-inicio:hover{
            transform:translateY(-5px);

            box-shadow:
            0 0 35px rgba(139,92,246,0.9);
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .titulo{
                font-size:42px;
            }

            .subtitulo{
                font-size:17px;
            }

            th, td{
                font-size:14px;
                padding:12px !important;
            }

        }

    </style>

</head>

<body>

    <!-- EFECTOS -->
    <div class="circulo1"></div>
    <div class="circulo2"></div>

    <div class="container py-5">

        <!-- TITULO -->

        <div class="text-center animate__animated animate__fadeInDown">

            <h1 class="titulo">
                🏆 Ranking Global
            </h1>

            <p class="subtitulo">
                Los mejores jugadores de CodeMaster
            </p>

        </div>

        <!-- TABLA -->

        <div class="ranking-card animate__animated animate__fadeInUp">

            <div class="table-responsive">

                <table class="table align-middle text-center">

                    <thead>

                        <tr>

                            <th>
                                #
                            </th>

                            <th>
                                Usuario
                            </th>

                            <th>
                                XP
                            </th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for usuario in usuarios %}

                        <tr>

                            <td class="puesto">

                                {% if loop.index == 1 %}

                                    <span class="oro">
                                        🥇
                                    </span>

                                {% elif loop.index == 2 %}

                                    <span class="plata">
                                        🥈
                                    </span>

                                {% elif loop.index == 3 %}

                                    <span class="bronce">
                                        🥉
                                    </span>

                                {% else %}

                                    {{ loop.index }}

                                {% endif %}

                            </td>

                            <td>
                                <i class="bi bi-person-circle"></i>
                                {{ usuario[0] }}
                            </td>

                            <td class="xp">

                                <i class="bi bi-lightning-charge-fill"></i>

                                {{ usuario[1] }} XP

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

        <!-- BOTON -->

        <div class="text-center">

            <a href="/dashboard">

                <button class="btn btn-inicio">

                    <i class="bi bi-house-door-fill"></i>
                    Volver al Inicio

                </button>

            </a>

        </div>

    </div>

</body>
</html>
