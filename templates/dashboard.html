<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | CodeMaster</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Animaciones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body{
            background:
            linear-gradient(135deg,#0f172a,#111827,#1e1b4b);
            min-height:100vh;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
            overflow-x:hidden;
        }

        /* NAVBAR */

        .navbar-custom{
            background:rgba(15,23,42,0.9);
            backdrop-filter:blur(10px);
            border-bottom:1px solid rgba(255,255,255,0.1);
            padding:15px 30px;
        }

        .logo{
            color:#38bdf8;
            font-size:30px;
            font-weight:900;
            text-shadow:0 0 15px #38bdf8;
        }

        .usuario{
            color:#cbd5e1;
            font-size:18px;
        }

        /* HERO */

        .hero{
            padding:50px 20px;
        }

        .titulo{
            font-size:50px;
            font-weight:900;
            color:#38bdf8;
            text-shadow:0 0 20px #38bdf8;
        }

        .subtitulo{
            color:#cbd5e1;
            margin-top:10px;
            font-size:18px;
        }

        /* CARD XP */

        .xp-card{
            background:rgba(30,41,59,0.8);
            border-radius:25px;
            padding:30px;
            margin-top:35px;
            box-shadow:
            0 0 25px rgba(0,0,0,0.3),
            0 0 20px rgba(56,189,248,0.15);
            border:1px solid rgba(255,255,255,0.08);
        }

        .xp-text{
            font-size:28px;
            font-weight:bold;
        }

        .progress{
            height:28px;
            border-radius:20px;
            background:#334155;
            margin-top:20px;
        }

        .progress-bar{
            background:
            linear-gradient(90deg,#22c55e,#16a34a);
            font-weight:bold;
        }

        /* CARDS */

        .menu-card{
            background:rgba(30,41,59,0.8);
            border-radius:25px;
            padding:35px;
            transition:0.4s;
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:
            0 0 25px rgba(0,0,0,0.25);
            height:100%;
        }

        .menu-card:hover{
            transform:translateY(-10px) scale(1.03);
            box-shadow:
            0 0 35px rgba(139,92,246,0.35);
            border:1px solid rgba(139,92,246,0.4);
        }

        .icono{
            font-size:60px;
            margin-bottom:20px;
            color:#8b5cf6;
        }

        .card-title{
            font-size:28px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .card-text{
            color:#cbd5e1;
        }

        .card-link{
            text-decoration:none;
            color:white;
        }

        /* EFECTOS */

        .circulo1{
            position:fixed;
            width:300px;
            height:300px;
            background:#7c3aed;
            border-radius:50%;
            filter:blur(120px);
            top:-100px;
            left:-100px;
            opacity:0.35;
            z-index:-1;
        }

        .circulo2{
            position:fixed;
            width:300px;
            height:300px;
            background:#38bdf8;
            border-radius:50%;
            filter:blur(120px);
            bottom:-100px;
            right:-100px;
            opacity:0.35;
            z-index:-1;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .titulo{
                font-size:38px;
            }

            .xp-text{
                font-size:22px;
            }

        }

    </style>

</head>

<body>

    <!-- EFECTOS -->
    <div class="circulo1"></div>
    <div class="circulo2"></div>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-custom">

        <div class="container-fluid">

            <div class="logo">
                <i class="bi bi-controller"></i>
                CodeMaster
            </div>

            <div class="usuario">
                <i class="bi bi-person-circle"></i>
                Bienvenido {{ nombre }}
            </div>

        </div>

    </nav>

    <!-- CONTENIDO -->

    <div class="container hero">

        <div class="animate__animated animate__fadeInDown">

            <h1 class="titulo">
                Panel Principal
            </h1>

            <p class="subtitulo">
                Continúa avanzando y conviértete en un maestro de la programación
            </p>

        </div>

        <!-- XP -->

        <div class="xp-card animate__animated animate__fadeInUp">

            <div class="d-flex justify-content-between align-items-center flex-wrap">

                <div class="xp-text">
                    <i class="bi bi-lightning-charge-fill text-warning"></i>
                    XP: {{ puntos }}
                </div>

                <div>
                    Nivel Gamer
                </div>

            </div>

            <div class="progress">

                <div
                    class="progress-bar progress-bar-striped progress-bar-animated"
                    style="width: {{ puntos }}%;">

                    {{ puntos }}%

                </div>

            </div>

        </div>

        <!-- CARDS -->

        <div class="row mt-5 g-4">

            <!-- NIVELES -->

            <div class="col-md-6">

                <a href="/niveles" class="card-link">

                    <div class="menu-card animate__animated animate__zoomIn">

                        <div class="icono">
                            <i class="bi bi-joystick"></i>
                        </div>

                        <div class="card-title">
                            Niveles
                        </div>

                        <div class="card-text">
                            Ingresa al modo juego y supera nuevos desafíos.
                        </div>

                    </div>

                </a>

            </div>

            <!-- RANKING -->

            <div class="col-md-6">

                <a href="/ranking" class="card-link">

                    <div class="menu-card animate__animated animate__zoomIn">

                        <div class="icono">
                            <i class="bi bi-trophy-fill"></i>
                        </div>

                        <div class="card-title">
                            Ranking
                        </div>

                        <div class="card-text">
                            Observa a los mejores estudiantes y sube posiciones.
                        </div>

                    </div>

                </a>

            </div>

        </div>

    </div>

</body>
</html>
