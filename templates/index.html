<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CodeMaster</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Animaciones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body{
            background: linear-gradient(135deg, #0f172a, #111827, #1e1b4b);
            min-height:100vh;
            overflow:hidden;
            font-family:Arial, Helvetica, sans-serif;
            color:white;
        }

        .hero{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            position:relative;
            z-index:2;
        }

        .titulo{
            font-size:90px;
            font-weight:900;
            color:#38bdf8;
            text-shadow:
                0 0 10px #38bdf8,
                0 0 20px #38bdf8,
                0 0 40px #38bdf8;
        }

        .subtitulo{
            font-size:24px;
            color:#cbd5e1;
            margin-top:20px;
        }

        .btn-jugar{
            margin-top:35px;
            background:linear-gradient(45deg,#8b5cf6,#7c3aed);
            border:none;
            padding:16px 45px;
            font-size:22px;
            border-radius:15px;
            color:white;
            font-weight:bold;
            transition:0.4s;
            box-shadow:0 0 20px rgba(139,92,246,0.5);
        }

        .btn-jugar:hover{
            transform:translateY(-5px) scale(1.05);
            box-shadow:0 0 30px rgba(139,92,246,0.9);
        }

        .icono{
            font-size:80px;
            color:#8b5cf6;
            margin-bottom:20px;
            animation: flotar 3s infinite ease-in-out;
        }

        @keyframes flotar{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-15px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        .circulo1{
            position:absolute;
            width:300px;
            height:300px;
            background:#7c3aed;
            border-radius:50%;
            filter:blur(120px);
            top:-100px;
            left:-100px;
            opacity:0.4;
        }

        .circulo2{
            position:absolute;
            width:300px;
            height:300px;
            background:#38bdf8;
            border-radius:50%;
            filter:blur(120px);
            bottom:-100px;
            right:-100px;
            opacity:0.4;
        }

        @media(max-width:768px){

            .titulo{
                font-size:55px;
            }

            .subtitulo{
                font-size:18px;
            }

            .btn-jugar{
                width:100%;
                font-size:20px;
            }

        }

    </style>

</head>

<body>

    <!-- EFECTOS -->
    <div class="circulo1"></div>
    <div class="circulo2"></div>

    <!-- CONTENIDO -->
    <div class="container hero">

        <div class="animate__animated animate__fadeIn">

            <i class="bi bi-controller icono"></i>

            <h1 class="titulo">
                CodeMaster
            </h1>

            <p class="subtitulo">
                Plataforma educativa interactiva de programación y SQL
            </p>

            <a href="/login">

                <button class="btn btn-jugar">
                    <i class="bi bi-play-fill"></i>
                    Iniciar Juego
                </button>

            </a>

        </div>

    </div>

</body>
</html>
