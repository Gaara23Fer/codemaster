<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nivel Completado | CodeMaster</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Animaciones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body{
            background:
            linear-gradient(135deg,#0f172a,#111827,#1e1b4b);
            min-height:100vh;
            overflow:hidden;
            font-family:Arial, Helvetica, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
            color:white;
        }

        /* EFECTOS */

        .circulo1{
            position:absolute;
            width:350px;
            height:350px;
            background:#22c55e;
            border-radius:50%;
            filter:blur(140px);
            top:-100px;
            left:-100px;
            opacity:0.35;
        }

        .circulo2{
            position:absolute;
            width:350px;
            height:350px;
            background:#38bdf8;
            border-radius:50%;
            filter:blur(140px);
            bottom:-100px;
            right:-100px;
            opacity:0.35;
        }

        /* CARD */

        .final-card{
            position:relative;
            z-index:2;
            width:100%;
            max-width:650px;
            padding:50px;
            border-radius:30px;
            background:rgba(30,41,59,0.8);
            backdrop-filter:blur(15px);
            text-align:center;
            box-shadow:
            0 0 40px rgba(0,0,0,0.4),
            0 0 25px rgba(34,197,94,0.2);

            border:1px solid rgba(255,255,255,0.1);
        }

        /* ICONO */

        .icono{
            font-size:90px;
            color:#22c55e;
            margin-bottom:20px;
            animation: rebote 2s infinite;
        }

        @keyframes rebote{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-12px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        /* TITULOS */

        .titulo{
            font-size:60px;
            font-weight:900;
            color:#22c55e;
            text-shadow:
            0 0 15px #22c55e,
            0 0 35px #22c55e;
        }

        .subtitulo{
            margin-top:20px;
            color:#cbd5e1;
            font-size:22px;
        }

        .nivel{
            margin-top:30px;
            font-size:28px;
            font-weight:bold;
            color:#38bdf8;
            text-shadow:0 0 12px #38bdf8;
        }

        /* BOTON */

        .btn-dashboard{
            margin-top:40px;
            background:
            linear-gradient(45deg,#8b5cf6,#7c3aed);

            border:none;
            padding:16px 45px;
            border-radius:15px;
            color:white;
            font-size:20px;
            font-weight:bold;

            transition:0.4s;

            box-shadow:
            0 0 20px rgba(139,92,246,0.5);
        }

        .btn-dashboard:hover{
            transform:translateY(-5px) scale(1.05);

            box-shadow:
            0 0 35px rgba(139,92,246,0.9);
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .final-card{
                margin:20px;
                padding:35px;
            }

            .titulo{
                font-size:40px;
            }

            .subtitulo{
                font-size:18px;
            }

            .nivel{
                font-size:22px;
            }

            .btn-dashboard{
                width:100%;
            }

        }

    </style>

</head>

<body>

    <!-- EFECTOS -->
    <div class="circulo1"></div>
    <div class="circulo2"></div>

    <!-- CARD FINAL -->

    <div class="final-card animate__animated animate__zoomIn">

        <div class="icono">
            <i class="bi bi-trophy-fill"></i>
        </div>

        <h1 class="titulo">
            ¡Nivel Completado!
        </h1>

        <p class="subtitulo">
            Terminaste exitosamente el Nivel 1 de CodeMaster.
            Continúa avanzando para convertirte en un maestro de la programación.
        </p>

        <div class="nivel">
            🔓 Nivel 2 desbloqueado
        </div>

        <a href="/dashboard">

            <button class="btn btn-dashboard">

                <i class="bi bi-house-door-fill"></i>
                Volver al Dashboard

            </button>

        </a>

    </div>

</body>
</html>
