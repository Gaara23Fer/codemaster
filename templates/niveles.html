<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Niveles</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        h1{
            margin-top:50px;
            color:#38bdf8;
        }

        .nivel{
            background:#1e293b;
            width:300px;
            margin:30px auto;
            padding:30px;
            border-radius:20px;
            transition:0.3s;
        }

        .nivel:hover{
            transform:scale(1.05);
            background:#334155;
        }

        a{
            text-decoration:none;
            color:white;
        }

        .bloqueado{
            background:gray;
            opacity:0.6;
        }

    </style>

</head>
<body>

<h1>Niveles</h1>

<!-- NIVEL 1 -->

<a href="/pregunta1">

    <div class="nivel">

        <h2>🟢 Nivel 1</h2>

        <p>
            Conceptos básicos
        </p>

    </div>

</a>

<!-- NIVEL 2 -->

{% if nivel1 %}

<a href="/nivel2">

    <div class="nivel">

        <h2>🟡 Nivel 2</h2>

        <p>
            SQL básico
        </p>

    </div>

</a>

{% else %}

<div class="nivel bloqueado">

    <h2>🔒 Nivel 2</h2>

    <p>
        Necesitas 30 XP
    </p>

</div>

{% endif %}

<!-- NIVEL 3 -->

{% if nivel2 %}

<a href="/nivel3">

    <div class="nivel">

        <h2>🔴 Nivel 3</h2>

        <p>
            SQL avanzado
        </p>

    </div>

</a>

{% else %}

<div class="nivel bloqueado">

    <h2>🔒 Nivel 3</h2>

    <p>
        Necesitas 60 XP
    </p>

</div>

{% endif %}
<a href="/dashboard">

    <button>
        🏠 Volver al inicio
    </button>

</a>
</body>
</html>
